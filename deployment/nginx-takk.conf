# /etc/nginx/sites-available/takk

upstream takk_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

# ---------------------------------------------------------------------------
# Gzip compression for text assets (JS, CSS, JSON, SVG)
# Note: place in http{} block in nginx.conf if gzip is already configured
# globally. These directives are valid in both http and server contexts.
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;
gzip_comp_level 6;

server {
    listen 80;
    server_name takk.local;  # Change to your local hostname/IP

    # Max upload size (for feedback)
    client_max_body_size 1M;

    # Logging
    access_log /var/log/nginx/takk-access.log;
    error_log /var/log/nginx/takk-error.log;

    # Root directory for React build output
    root /opt/takk/app/components/dist;

    # ---------------------------------------------------------------------------
    # IMPORTANT: nginx does NOT inherit add_header from parent blocks when a
    # location block defines its own add_header. Security headers must be
    # repeated in every location block that sets its own Cache-Control.
    # ---------------------------------------------------------------------------

    # Security headers for the catch-all location / (no custom cache headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---------------------------------------------------------------------------
    # index.html — must never be cached.
    # Vite embeds hashed asset filenames (vendor-abc123.js) inside index.html.
    # If index.html is cached, users load stale JS/CSS after every deploy until
    # the cache expires. no-cache forces revalidation on every request (304 if
    # unchanged = near-zero bandwidth cost).
    # ---------------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ---------------------------------------------------------------------------
    # Vite-hashed JS and CSS bundles — cache permanently (1 year + immutable).
    # Vite puts a content hash in every asset filename:
    #   vendor-2jViZ1ew.js, index-CRLLySgt.js, index-CnyC2cxN.css
    # When source changes, the hash changes, so the browser fetches a new URL.
    # immutable tells browsers to never revalidate during max-age — safe here
    # because the filename itself is the cache-buster.
    #
    # After the code-split refactor, this covers:
    #   vendor.js   (~44 KB) — React + React Router, changes only on dep upgrades
    #   icons.js    (~5 KB)  — Lucide icons, very stable
    #   index.js    (~184 KB) — Home + shared components
    #   Competition.js, Dictionary.js, Quiz.js, Training.js, etc. (1–8 KB each)
    # ---------------------------------------------------------------------------
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ---------------------------------------------------------------------------
    # SPA fallback — all other routes return index.html.
    # Security headers inherited from server block (no add_header here).
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # API proxy to Flask/Gunicorn
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://takk_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ---------------------------------------------------------------------------
    # Media files — videos (mp4), images (jpg/png/webp), audio (mp3)
    #
    # These are committed to git WITHOUT content hashes in their filenames
    # (e.g., hej_square.mp4 stays hej_square.mp4 even if re-processed).
    # Therefore immutable must NOT be used — if a sign is corrected and
    # re-deployed, browsers must be able to revalidate.
    #
    # Cache strategy: 30-day max-age. After expiry, browser sends
    # If-None-Match with nginx's ETag; if unchanged, nginx replies 304
    # (zero bandwidth). If the file changed, nginx sends new content.
    #
    # 30 days is aggressive but justified:
    #   - Videos are 2 MB each; 80-150 users across 10-15 locations
    #   - Most users watch the same signs repeatedly in practice sessions
    #   - Corrections to sign videos are rare; a 30-day lag is acceptable
    #   - ETag revalidation ensures correctness after the cache window
    #
    # For production (HTTPS): add "Partitioned" or use service workers for
    # cross-origin cache isolation if needed.
    # ---------------------------------------------------------------------------
    location /media/ {
        alias /opt/takk/media/;

        add_header Cache-Control "public, max-age=2592000" always;  # 30 days
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # nginx enables Accept-Ranges and ETag by default for static files
        # served via alias. No extra directives needed for video seeking.

        types {
            video/mp4   mp4;
            audio/mpeg  mp3;
            image/jpeg  jpg jpeg;
            image/png   png;
            image/webp  webp;
        }
    }

    # ---------------------------------------------------------------------------
    # Health check — not logged, not cached
    # ---------------------------------------------------------------------------
    location /health {
        proxy_pass http://takk_app;
        access_log off;
    }
}
