<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKK - Mouth Blur Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0b1220;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .video-container {
            position: relative;
            width: 600px;
            height: 600px;
            background: black;
            border-radius: 8px;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .blur-overlay {
            position: absolute;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            pointer-events: none;
        }

        .info {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            min-width: 400px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <!-- ============================ -->
    <!-- TWEAK THESE VALUES -->
    <!-- ============================ -->
    <script>
        // Blur bar position (percentage from top of video)
        const BLUR_TOP = 25;      // Start of blur (% from top)
        const BLUR_BOTTOM = 35;   // End of blur (% from top)

        // Blur intensity (pixels)
        const BLUR_AMOUNT = 12;   // 0-20 typical range

        // Overlay darkness (0 = transparent, 1 = fully black)
        const OVERLAY_OPACITY = 0.3;

        // Playback speed (1 = normal, 2 = 2x, 3 = 3x, etc.)
        const PLAYBACK_SPEED = 3;

        // List all your sign folders here (just the folder names)
        const SIGNS = [
            'akta', 'bada', 'bajsa', 'bra', 'byta', 'byta_blöja', 'byta_personal', 'byta_stol',
            'dricka', 'du_ska_åka_hem', 'du_ska_åka_till_jobbet', 'du_är_busig', 'du_är_fin',
            'du_är_rolig', 'du_är_snäll', 'duktig', 'duscha', 'fin', 'frukt', 'färdig',
            'gå', 'gå_in', 'gå_ut', 'hej', 'hem', 'hjälpa', 'idag', 'imorgon',
            'jag_heter', 'jobb', 'kaffe', 'kallt', 'kissa', 'ledsen', 'mamma', 'nu',
            'nu_ska_du_åka_hem', 'nu_ska_du_åka_till_jobbet', 'nu_ska_vi', 'nu_ska_vi_gå_in',
            'nu_ska_vi_gå_ut', 'pappa', 'personal', 'roligt', 'sen', 'sitta', 'snart',
            'snäll', 'tack', 'tack_för_hjälpen', 'taxi', 'taxin_kommer_snart', 'toa',
            'trasig', 'trött', 'varmt', 'varsågod', 'vet_inte', 'vila', 'vill_du',
            'vill_du_ha_hjälp', 'vill_du_ha_mer', 'vill_du_ha_mer_kaffe', 'vill_du_ha_mer_ketchup',
            'vän', 'vänta', 'äta', 'åka'
        ];
    </script>
    <!-- ============================ -->

    <h1>TAKK Mouth Blur Test</h1>

    <div class="info">
        <div id="current-sign" style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">Laddar...</div>
        <div id="progress" style="font-size: 14px; opacity: 0.7;">0 / 0</div>
    </div>

    <div class="video-container">
        <video id="video" muted></video>
        <div class="blur-overlay" id="blur-overlay"></div>
    </div>

    <div class="controls">
        <button onclick="prevVideo()">← Föregående</button>
        <button onclick="togglePlay()" id="playBtn">⏸ Pausa</button>
        <button onclick="nextVideo()">Nästa →</button>
    </div>

    <div style="text-align: center; opacity: 0.7; max-width: 600px;">
        <p>Videorna spelar automatiskt efter varandra i <strong>3x hastighet</strong>. Använd knapparna för att hoppa fram/tillbaka.</p>
        <p><strong>För att ändra inställningar:</strong> Redigera värdena högst upp i HTML-filen (BLUR_TOP, BLUR_BOTTOM, BLUR_AMOUNT, OVERLAY_OPACITY, PLAYBACK_SPEED)</p>
    </div>

    <script>
        // Apply blur settings from variables above
        const video = document.getElementById('video');
        const overlay = document.getElementById('blur-overlay');
        const currentSignEl = document.getElementById('current-sign');
        const progressEl = document.getElementById('progress');
        const playBtn = document.getElementById('playBtn');

        let currentIndex = 0;
        let isPlaying = true;

        // Apply blur overlay styling
        overlay.style.top = BLUR_TOP + '%';
        overlay.style.bottom = (100 - BLUR_BOTTOM) + '%';
        overlay.style.backdropFilter = `blur(${BLUR_AMOUNT}px)`;
        overlay.style.webkitBackdropFilter = `blur(${BLUR_AMOUNT}px)`;
        overlay.style.background = `rgba(0, 0, 0, ${OVERLAY_OPACITY})`;

        function loadVideo(index) {
            if (index < 0 || index >= SIGNS.length) return;

            currentIndex = index;
            const sign = SIGNS[index];
            const videoPath = `media/signs/${sign}/${sign}_square.mp4`;

            video.src = videoPath;
            video.playbackRate = PLAYBACK_SPEED; // Set playback speed
            currentSignEl.textContent = sign.replace(/_/g, ' ');
            progressEl.textContent = `${index + 1} / ${SIGNS.length}`;

            if (isPlaying) {
                video.play().catch(err => {
                    console.log('Autoplay prevented:', err);
                    isPlaying = false;
                    playBtn.textContent = '▶ Spela';
                });
            }
        }

        function nextVideo() {
            if (currentIndex < SIGNS.length - 1) {
                loadVideo(currentIndex + 1);
            } else {
                loadVideo(0); // Loop back to start
            }
        }

        function prevVideo() {
            if (currentIndex > 0) {
                loadVideo(currentIndex - 1);
            }
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                isPlaying = true;
                playBtn.textContent = '⏸ Pausa';
            } else {
                video.pause();
                isPlaying = false;
                playBtn.textContent = '▶ Spela';
            }
        }

        // Auto-advance to next video when current one ends
        video.addEventListener('ended', () => {
            nextVideo();
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextVideo();
            if (e.key === 'ArrowLeft') prevVideo();
            if (e.key === ' ') {
                e.preventDefault();
                togglePlay();
            }
        });

        // Start with first video
        loadVideo(0);
    </script>
</body>
</html>
